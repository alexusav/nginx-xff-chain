version: '3.8'

services:
  nginx1:
    image: nginx:alpine
    container_name: nginx1
    volumes:
      - ./nginx1/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8091:80"
    networks:
      - proxy-net


  nginx2:
    image: nginx:alpine
    container_name: nginx2
    volumes:
      - ./nginx2/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8092:80"
    networks:
      - proxy-net


  nginx3:
    image: nginx:alpine
    container_name: nginx3
    volumes:
      - ./nginx3/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8093:80"
    networks:
      - proxy-net

  app:
    build: ./app
    container_name: app
    networks:
      - proxy-net
    ports:
      - "5000:5000"

networks:
  proxy-net:
    driver: bridge
